<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Мой блокнот</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --ink: #1a1a2e;
    --ink-light: #6b6b8a;
    --done: #b0aec0;
    --accent: #e74c6f;
    --bg: #fafaf7;
    --line: #e8e6f0;
    --alarm: #e07b2a;
    --shadow: rgba(100,90,130,0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'Caveat', cursive;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--bg);
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--line);
    box-shadow: 0 2px 12px var(--shadow);
  }

  .app-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .app-title span {
    color: var(--accent);
  }

  .header-date {
    font-size: 14px;
    color: var(--ink-light);
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-icon {
    width: 44px; height: 44px;
    border: none; background: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: background 0.15s, transform 0.1s;
    color: var(--ink);
  }
  .btn-icon:active { transform: scale(0.88); background: var(--line); }
  .btn-icon svg { width: 26px; height: 26px; }

  .btn-mic.recording {
    background: rgba(231,76,111,0.12);
    color: var(--accent);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(231,76,111,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(231,76,111,0); }
  }

  /* ── TASK LIST ── */
  #task-list {
    position: fixed;
    top: 75px; bottom: 0; left: 0; right: 0;
    overflow-y: auto;
    padding: 10px 0 40px;
    -webkit-overflow-scrolling: touch;
  }

  .task-item {
    display: flex;
    align-items: flex-start;
    padding: 14px 20px 14px 18px;
    border-bottom: 1px solid var(--line);
    position: relative;
    transition: background 0.2s;
    cursor: pointer;
    user-select: none;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:active { background: rgba(0,0,0,0.02); }

  .task-num {
    font-size: 18px;
    color: var(--ink-light);
    min-width: 30px;
    padding-top: 1px;
    font-weight: 500;
    flex-shrink: 0;
    transition: color 0.3s;
  }

  .task-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .task-text {
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.35;
    word-break: break-word;
    transition: color 0.3s, text-decoration 0.3s;
    position: relative;
  }

  .task-alarm-tag {
    font-size: 14px;
    color: var(--alarm);
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 400;
  }
  .task-alarm-tag svg { width: 14px; height: 14px; }

  /* Done state */
  .task-item.done .task-text {
    text-decoration: line-through;
    color: var(--done);
  }
  .task-item.done .task-num { color: var(--line); }
  .task-item.done .task-alarm-tag { opacity: 0.4; }

  /* Delete btn */
  .btn-delete {
    width: 36px; height: 36px;
    border: none; background: none;
    color: #ccc;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    flex-shrink: 0;
    margin-left: 6px;
    margin-top: 2px;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    pointer-events: none;
  }
  .btn-delete svg { width: 18px; height: 18px; }
  .btn-delete.visible {
    opacity: 1;
    pointer-events: auto;
    color: #e05c6e;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 30px 20px;
    color: var(--ink-light);
  }
  .empty-state .big { font-size: 28px; margin-bottom: 8px; }
  .empty-state .hint { font-size: 18px; line-height: 1.5; }

  /* ── MODAL: Add task ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,15,40,0.35);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }

  .modal-sheet {
    background: var(--bg);
    width: 100%;
    max-width: 600px;
    border-radius: 20px 20px 0 0;
    padding: 20px 22px 30px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .modal-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 14px;
  }

  #task-input {
    width: 100%;
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    background: none;
    border: none;
    border-bottom: 2px solid var(--line);
    padding: 8px 2px;
    outline: none;
    resize: none;
    min-height: 60px;
    transition: border-color 0.2s;
  }
  #task-input:focus { border-color: var(--accent); }
  #task-input::placeholder { color: var(--done); }

  .modal-hint {
    font-size: 14px;
    color: var(--ink-light);
    margin: 10px 0 18px;
    line-height: 1.5;
  }
  .modal-hint strong { color: var(--alarm); }

  .btn-save {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-save:active { transform: scale(0.97); background: #2d2b45; }

  /* ── VOICE OVERLAY ── */
  .voice-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,15,40,0.55);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    backdrop-filter: blur(4px);
  }
  .voice-overlay.open { display: flex; }

  .voice-mic-anim {
    width: 90px; height: 90px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: micPulse 1.2s ease-in-out infinite;
  }
  @keyframes micPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231,76,111,0.4); }
    50% { transform: scale(1.08); box-shadow: 0 0 0 18px rgba(231,76,111,0); }
  }
  .voice-mic-anim svg { width: 42px; height: 42px; color: white; }

  .voice-label {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: white;
    font-weight: 500;
  }
  .voice-transcript {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: rgba(255,255,255,0.8);
    text-align: center;
    max-width: 300px;
    min-height: 30px;
    font-style: italic;
  }
  .btn-voice-cancel {
    margin-top: 10px;
    padding: 10px 30px;
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 50px;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    cursor: pointer;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    padding: 10px 22px;
    border-radius: 50px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 400;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Scrollbar */
  #task-list::-webkit-scrollbar { width: 4px; }
  #task-list::-webkit-scrollbar-track { background: transparent; }
  #task-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="app-title">Мой блокнот<span>.</span></div>
    <div class="header-date" id="header-date"></div>
  </div>
  <div class="header-actions">
    <button class="btn-icon btn-mic" id="btn-mic" title="Голосовой ввод">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="9" y1="22" x2="15" y2="22"/>
      </svg>
    </button>
    <button class="btn-icon btn-add" id="btn-add" title="Добавить задачу">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>
</header>

<!-- TASK LIST -->
<div id="task-list">
  <div class="empty-state" id="empty-state">
    <div class="big">✏️</div>
    <div class="hint">Нажми <strong>+</strong> чтобы добавить задачу<br>или <strong>🎤</strong> чтобы продиктовать</div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal-add">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Новая задача</div>
    <textarea id="task-input" placeholder="Что нужно сделать?" rows="2"></textarea>
    <div class="modal-hint">
      Можешь написать время: <strong>«завтра в 10», «через 2 часа», «в пятницу в 15:00»</strong> — и придёт напоминание
    </div>
    <button class="btn-save" id="btn-save">Записать</button>
  </div>
</div>

<!-- VOICE OVERLAY -->
<div class="voice-overlay" id="voice-overlay">
  <div class="voice-mic-anim">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="11" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="9" y1="22" x2="15" y2="22"/>
    </svg>
  </div>
  <div class="voice-label">Говорите...</div>
  <div class="voice-transcript" id="voice-transcript"></div>
  <button class="btn-voice-cancel" id="btn-voice-cancel">Отмена</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('nb_tasks') || '[]');
let activeDeleteId = null;

// ── Date header ────────────────────────────────────────
function updateDate() {
  const now = new Date();
  const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  document.getElementById('header-date').textContent =
    `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
}
updateDate();
setInterval(updateDate, 60000);

// ── Save ───────────────────────────────────────────────
function save() {
  localStorage.setItem('nb_tasks', JSON.stringify(tasks));
}

// ── Render ─────────────────────────────────────────────
function render() {
  const list = document.getElementById('task-list');
  const empty = document.getElementById('empty-state');
  const items = tasks.filter(t => !t.deleted);

  empty.style.display = items.length === 0 ? 'block' : 'none';

  // Remove old items
  list.querySelectorAll('.task-item').forEach(el => el.remove());

  items.forEach((task, idx) => {
    const div = document.createElement('div');
    div.className = 'task-item' + (task.done ? ' done' : '');
    div.dataset.id = task.id;

    let alarmHTML = '';
    if (task.alarmTime) {
      const d = new Date(task.alarmTime);
      const hh = d.getHours().toString().padStart(2,'0');
      const mm = d.getMinutes().toString().padStart(2,'0');
      const dd = d.getDate();
      const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()];
      alarmHTML = `<div class="task-alarm-tag">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/>
          <path d="M5 3 3 5"/><path d="M19 3l2 2"/>
        </svg>
        ${dd} ${mo} в ${hh}:${mm}
      </div>`;
    }

    div.innerHTML = `
      <div class="task-num">${idx + 1}.</div>
      <div class="task-body">
        <div class="task-text">${escHtml(task.text)}</div>
        ${alarmHTML}
      </div>
      <button class="btn-delete" data-id="${task.id}" title="Удалить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>`;

    list.appendChild(div);

    // Tap on task body → toggle done
    div.querySelector('.task-body').addEventListener('click', (e) => {
      e.stopPropagation();
      hideDelete();
      task.done = !task.done;
      save(); render();
    });
    div.querySelector('.task-num').addEventListener('click', (e) => {
      e.stopPropagation();
      hideDelete();
      task.done = !task.done;
      save(); render();
    });

    // Tap on right side → show delete
    const delBtn = div.querySelector('.btn-delete');
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteTask(task.id);
    });

    // Show delete on long-press / tap right area
    div.addEventListener('click', (e) => {
      // if tap was near right edge
      const rect = div.getBoundingClientRect();
      const x = e.clientX - rect.left;
      if (x > rect.width - 55) {
        e.stopPropagation();
        if (activeDeleteId === task.id) {
          deleteTask(task.id);
        } else {
          showDelete(task.id);
        }
      }
    });
  });
}

function showDelete(id) {
  hideDelete();
  activeDeleteId = id;
  const el = document.querySelector(`.task-item[data-id="${id}"] .btn-delete`);
  if (el) el.classList.add('visible');
  setTimeout(() => {
    if (activeDeleteId === id) hideDelete();
  }, 3000);
}

function hideDelete() {
  document.querySelectorAll('.btn-delete.visible').forEach(el => el.classList.remove('visible'));
  activeDeleteId = null;
}

function deleteTask(id) {
  tasks = tasks.map(t => t.id === id ? {...t, deleted: true} : t);
  save(); render();
  showToast('Задача удалена');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.task-item')) hideDelete();
});

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Toast ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Add modal ──────────────────────────────────────────
document.getElementById('btn-add').addEventListener('click', () => openModal());
document.getElementById('modal-add').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

function openModal(prefill = '') {
  const inp = document.getElementById('task-input');
  inp.value = prefill;
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => inp.focus(), 250);
}
function closeModal() {
  document.getElementById('modal-add').classList.remove('open');
  document.getElementById('task-input').value = '';
}

document.getElementById('btn-save').addEventListener('click', () => {
  const text = document.getElementById('task-input').value.trim();
  if (!text) return;
  addTask(text);
  closeModal();
});

document.getElementById('task-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('btn-save').click();
  }
});

// ── Add Task ───────────────────────────────────────────
function addTask(text) {
  const alarmTime = parseAlarmTime(text);
  const cleanText = alarmTime ? stripTimePhrase(text) : text;
  const task = {
    id: Date.now().toString(),
    text: cleanText || text,
    done: false,
    deleted: false,
    alarmTime: alarmTime ? alarmTime.getTime() : null,
    createdAt: Date.now()
  };
  tasks.unshift(task);
  save(); render();

  if (alarmTime) {
    scheduleNotification(task);
    const diff = alarmTime - Date.now();
    const hrs = Math.floor(diff / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    let when = '';
    if (hrs > 0) when = `через ${hrs} ч ${mins} мин`;
    else if (mins > 0) when = `через ${mins} мин`;
    else when = 'скоро';
    showToast(`⏰ Напомню ${when}`);
  } else {
    showToast('Задача добавлена');
  }
}

// ── Parse Russian time phrases ─────────────────────────
function parseAlarmTime(text) {
  const now = new Date();
  const t = text.toLowerCase();

  // Helper: set time on a date
  function setTime(date, h, m = 0) {
    const d = new Date(date);
    d.setHours(h, m, 0, 0);
    return d;
  }

  // Extract clock time from string: "в 12", "в 12:30", "в 9-00"
  function extractClock(str) {
    const m = str.match(/в\s+(\d{1,2})(?:[:\-\.](\d{2}))?/);
    if (m) return { h: parseInt(m[1]), min: m[2] ? parseInt(m[2]) : 0 };
    // "в полдень"
    if (/в\s+полдень/.test(str)) return { h: 12, min: 0 };
    // "в полночь"
    if (/в\s+полночь/.test(str)) return { h: 0, min: 0 };
    return null;
  }

  const clock = extractClock(t);

  // "через N минут/часов"
  {
    const m = t.match(/через\s+(\d+)\s*(минут|мин|час|часов|ч\b)/);
    if (m) {
      const n = parseInt(m[1]);
      const isMin = /минут|мин/.test(m[2]);
      const ms = isMin ? n * 60000 : n * 3600000;
      return new Date(now.getTime() + ms);
    }
  }

  // "сегодня в..."
  if (/сегодня/.test(t) && clock) {
    const d = setTime(now, clock.h, clock.min);
    if (d > now) return d;
    return null;
  }

  // "завтра в..."
  if (/завтра/.test(t)) {
    const tom = new Date(now); tom.setDate(now.getDate() + 1);
    if (clock) return setTime(tom, clock.h, clock.min);
    return setTime(tom, 9, 0);
  }

  // "послезавтра"
  if (/послезавтра/.test(t)) {
    const d2 = new Date(now); d2.setDate(now.getDate() + 2);
    if (clock) return setTime(d2, clock.h, clock.min);
    return setTime(d2, 9, 0);
  }

  // Days of week
  const weekDays = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  for (let i = 0; i < weekDays.length; i++) {
    if (t.includes(weekDays[i]) || t.includes(['вс','пн','вт','ср','чт','пт','сб'][i])) {
      const curDay = now.getDay();
      let diff = i - curDay;
      if (diff <= 0) diff += 7;
      const d = new Date(now); d.setDate(now.getDate() + diff);
      return setTime(d, clock ? clock.h : 9, clock ? clock.min : 0);
    }
  }

  // Just "в 12:00" without date — assume today, if past → tomorrow
  if (clock) {
    let d = setTime(now, clock.h, clock.min);
    if (d <= now) { d.setDate(d.getDate() + 1); }
    return d;
  }

  return null;
}

function stripTimePhrase(text) {
  return text
    .replace(/\s*(завтра|послезавтра|сегодня)\s*/gi, ' ')
    .replace(/\s*через\s+\d+\s*(минут|мин|час|часов|ч)\s*/gi, ' ')
    .replace(/\s*в\s+\d{1,2}(?:[:\-\.]\d{2})?\s*/gi, ' ')
    .replace(/\s*в\s+(полдень|полночь)\s*/gi, ' ')
    .replace(/\s*(напомни|напомнить|мне)\s*/gi, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// ── Notifications ──────────────────────────────────────
function requestNotifPerm() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}
requestNotifPerm();

function scheduleNotification(task) {
  if (!('Notification' in window)) return;
  const delay = task.alarmTime - Date.now();
  if (delay <= 0) return;

  setTimeout(async () => {
    if (Notification.permission !== 'granted') {
      await Notification.requestPermission();
    }
    if (Notification.permission === 'granted') {
      new Notification('⏰ Напоминание', {
        body: task.text,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📝</text></svg>'
      });
    }
  }, delay);
}

// Re-schedule on load
function rescheduleAll() {
  const now = Date.now();
  tasks.forEach(t => {
    if (t.alarmTime && t.alarmTime > now && !t.done && !t.deleted) {
      scheduleNotification(t);
    }
  });
}
rescheduleAll();

// ── Voice Input ────────────────────────────────────────
let recognition = null;
let isRecording = false;

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'ru-RU';
  r.continuous = false;
  r.interimResults = true;
  r.maxAlternatives = 1;
  return r;
}

document.getElementById('btn-mic').addEventListener('click', startVoice);
document.getElementById('btn-voice-cancel').addEventListener('click', stopVoice);

function startVoice() {
  recognition = initRecognition();
  if (!recognition) {
    showToast('Голосовой ввод не поддерживается');
    return;
  }

  document.getElementById('voice-overlay').classList.add('open');
  document.getElementById('voice-transcript').textContent = '';
  isRecording = true;

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('voice-transcript').textContent = final || interim;
    if (final) {
      setTimeout(() => {
        stopVoice();
        addTask(final.trim());
      }, 500);
    }
  };

  recognition.onerror = (e) => {
    stopVoice();
    if (e.error !== 'aborted') showToast('Не удалось распознать речь');
  };

  recognition.onend = () => {
    if (isRecording) stopVoice();
  };

  recognition.start();
}

function stopVoice() {
  isRecording = false;
  document.getElementById('voice-overlay').classList.remove('open');
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
}

// ── Init ───────────────────────────────────────────────
render();
</script>
